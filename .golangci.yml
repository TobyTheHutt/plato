version: "2"
run:
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - depguard
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - gosec
    - govet
    - ineffassign
    - maintidx
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unused
  settings:
    cyclop:
      max-complexity: 25
      package-average: 12
    depguard:
      rules:
        domain-boundaries:
          files:
            - internal/domain/**/*.go
          deny:
            - pkg: plato/backend/internal/service
              desc: domain layer must not depend on service layer
            - pkg: plato/backend/internal/httpapi
              desc: domain layer must not depend on transport layer
            - pkg: plato/backend/internal/adapters
              desc: domain layer must remain infrastructure agnostic
        service-boundaries:
          files:
            - internal/service/**/*.go
          deny:
            - pkg: plato/backend/internal/httpapi
              desc: service layer must not depend on transport layer
    dupl:
      threshold: 220
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 220
      statements: 120
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
      numbers: true
      ignore-calls: false
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
        - unnamedResult
        - httpNoBody
        - sprintfQuotedString
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 20
    govet:
      enable:
        - shadow
      settings:
        shadow:
          strict: true
    maintidx:
      under: 15
    nestif:
      min-complexity: 16
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      confidence: 0.8
      severity: warning
      enable-all-rules: false
      enable-default-rules: false
      directives:
        - name: specify-disable-reason
          severity: error
      rules:
        - name: blank-imports
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: deep-exit
        - name: defer
        - name: duplicated-imports
        - name: empty-block
        - name: error-return
        - name: errorf
        - name: import-shadowing
        - name: modifies-value-receiver
        - name: range-val-address
        - name: time-equal
        # Covered by govet.
        - name: atomic
          disabled: true
        # Covered by errcheck.
        - name: unchecked-type-assertion
          disabled: true
        # Covered by staticcheck.
        - name: unreachable-code
          disabled: true
        # Covered by staticcheck.
        - name: error-strings
          disabled: true
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
        path: internal/httpapi/routes_.*\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
